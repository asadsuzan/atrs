<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATRS Documentation</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>ATRS Docs</h1>
            </div>
            <nav id="nav-tree" class="nav-tree">
                <!-- Navigation will be dynamically injected here -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content-wrapper">
            <header class="content-header">
                <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Toggle Menu">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="breadcrumb" id="breadcrumb"></div>
            </header>
            <div id="content" class="markdown-body">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading documentation...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Configure Marked to use highlight.js
        marked.setOptions({
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const elements = {
            navTree: document.getElementById('nav-tree'),
            content: document.getElementById('content'),
            breadcrumb: document.getElementById('breadcrumb'),
            mobileBtn: document.getElementById('mobile-menu-btn'),
            sidebar: document.querySelector('.sidebar')
        };

        let navData = [];

        async function init() {
            try {
                const response = await fetch('nav.json');
                if (!response.ok) throw new Error('Could not load navigation data');
                navData = await response.json();
                renderNav(navData, elements.navTree);
                
                // Handle initial URL hash or load README by default
                handleRoute();
                window.addEventListener('hashchange', handleRoute);
            } catch (error) {
                console.error(error);
                elements.content.innerHTML = `
                    <div class="error-state">
                        <h2>Failed to load navigation</h2>
                        <p>Make sure you have run <code>npm run docs:nav</code> to generate nav.json.</p>
                    </div>
                `;
            }
        }

        function renderNav(items, container, level = 0) {
            const ul = document.createElement('ul');
            if (level > 0) ul.classList.add('nav-submenu');

            items.forEach(item => {
                const li = document.createElement('li');
                li.classList.add('nav-item');

                if (item.type === 'directory') {
                    const button = document.createElement('button');
                    button.classList.add('nav-dir-btn');
                    button.innerHTML = `
                        <svg class="chevron" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        <span>${formatName(item.name)}</span>
                    `;
                    
                    button.addEventListener('click', () => {
                        li.classList.toggle('open');
                    });
                    
                    li.appendChild(button);
                    
                    // Render children
                    if (item.children && item.children.length > 0) {
                        renderNav(item.children, li, level + 1);
                    }
                } else if (item.type === 'file') {
                    const a = document.createElement('a');
                    a.classList.add('nav-link');
                    a.href = '#' + item.path;
                    a.textContent = item.name;
                    a.dataset.path = item.path;
                    
                    a.addEventListener('click', () => {
                        if (window.innerWidth <= 768) {
                            elements.sidebar.classList.remove('open');
                        }
                    });
                    
                    li.appendChild(a);
                }

                ul.appendChild(li);
            });

            container.appendChild(ul);
        }

        async function loadContent(path) {
            elements.content.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                </div>
            `;
            
            try {
                // Determine if we need to load a specific file or the default README
                const pathToLoad = path || 'README.md';
                
                const response = await fetch(pathToLoad);
                if (!response.ok) {
                    if (response.status === 404) throw new Error('Document not found');
                    throw new Error('Failed to load document');
                }
                
                const text = await response.text();
                
                // Add a small fade-in effect
                elements.content.style.opacity = '0';
                elements.content.innerHTML = marked.parse(text);
                
                // Trigger reflow
                void elements.content.offsetWidth;
                elements.content.style.opacity = '1';
                
                updateBreadcrumb(pathToLoad);
                updateActiveNav(pathToLoad);
                
            } catch (error) {
                elements.content.innerHTML = `
                    <div class="error-state">
                        <h2>Opps!</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function handleRoute() {
            const hash = window.location.hash.substring(1);
            loadContent(hash);
        }

        function updateBreadcrumb(path) {
            if (path === 'README.md') {
                elements.breadcrumb.innerHTML = '<span>Home</span>';
                return;
            }
            
            const parts = path.split('/');
            let html = '<span>Home</span>';
            
            parts.forEach((part, index) => {
                html += ` <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg> `;
                const name = part.replace('.md', '');
                html += `<span>${formatName(name)}</span>`;
            });
            
            elements.breadcrumb.innerHTML = html;
        }

        function updateActiveNav(path) {
            // Remove previous active classes
            document.querySelectorAll('.nav-link.active').forEach(el => el.classList.remove('active'));
            
            // Find current and set active
            const current = document.querySelector(`.nav-link[data-path="${path}"]`);
            if (current) {
                current.classList.add('active');
                
                // Open parent directories
                let parent = current.closest('.nav-submenu');
                while (parent) {
                    const li = parent.closest('.nav-item');
                    if (li) li.classList.add('open');
                    parent = li ? li.closest('.nav-submenu') : null;
                }
            }
        }

        function formatName(str) {
            return str
                .replace(/-/g, ' ')
                .replace(/\b\w/g, l => l.toUpperCase());
        }

        // Mobile menu toggle
        elements.mobileBtn.addEventListener('click', () => {
            elements.sidebar.classList.toggle('open');
        });

        // Start app
        init();
    </script>
</body>
</html>
